name: ESPHome Firmware Relay
description: Lokaler Proxy/Cache für ESPHome OTA-Updates aus privaten GitHub Repos
version: 0.1.0
slug: esphome-relay
image: ghcr.io/nebensound/esphome-relay
url: https://github.com/Nebensound/ESPHome-Relay
arch:
  - amd64
  - aarch64
  - armv7
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:chip
panel_title: ESPHome Relay
map:
  - data:rw
options:
  github_token: ""
  github_repo: "Nebensound/wagnerhof-esphome"
  poll_interval_minutes: 30
  webhook_secret: ""
  cache_dir: "/data/firmware-cache"
  log_level: "info"
schema:
  github_token: str
  github_repo: str
  poll_interval_minutes: "int(5,1440)"
  webhook_secret: str?
  cache_dir: str
  log_level: list(trace|debug|info|warn|error)
ports:
  "8099/tcp": 8099
ports_description:
  "8099/tcp": "HTTP API & Firmware Serving"
